# =====================================================================
#  DECAP CMS — configuration préparatoire (Phase 2A)
#  ---------------------------------------------------------------------
#  ⚠️ AUCUN secret / token / clé / cloud_name privé dans ce fichier.
#  L'authentification n'est pas encore branchée : voir docs/decap-cms-setup.md.
#  Tant que le backend n'est pas finalisé, /admin s'affiche mais ne publie pas.
#
#  Le site PUBLIC continue de lire les données TypeScript actuelles
#  (src/data/*.ts, src/content/*.ts). Les fichiers édités ici (content/cms/…)
#  sont une PRÉPARATION : ils ne sont pas encore la source de vérité.
#  Stratégie de transition : voir docs/decap-cms-setup.md.
# =====================================================================

# --- BACKEND (à FINALISER, sans secret dans le repo) -----------------
# Choix d'auth possibles (un seul) :
#   1) Netlify Identity + Git Gateway  → décommenter `git-gateway`.
#   2) OAuth GitHub (via Vercel/un proxy OAuth) → name: github + base_url du proxy.
# Aucune clé n'est stockée ici : elles vivront dans les Variables Netlify/Vercel.
backend:
  name: git-gateway        # placeholder — nécessite Netlify Identity (à brancher)
  branch: main
  # commit_messages personnalisés (facultatif) :
  # commit_messages:
  #   create: 'cockpit: ajout {{collection}} “{{slug}}”'
  #   update: 'cockpit: modification {{collection}} “{{slug}}”'

# Permet d'éditer en local sans backend distant (dev) :
local_backend: true

# Flux éditorial (brouillon → relecture → publication) :
publish_mode: editorial_workflow

# --- MÉDIAS / IMAGES -------------------------------------------------
# V1 : upload SIMPLE vers un dossier du dépôt (aucun service externe,
# aucune clé). Les images déposées depuis l'admin atterrissent dans
# public/uploads/oeuvres/ et sont servies depuis /uploads/oeuvres/…
# (le champ « image » d'une œuvre stocke ce chemin).
media_folder: "public/uploads/oeuvres"
public_folder: "/uploads/oeuvres"
#
# Plus tard (optionnel) : Cloudinary pour l'optimisation hors dépôt,
# à configurer SANS clé dans le repo. Voir docs/cloudinary-setup.md.
# media_library:
#   name: cloudinary
#   config:
#     cloud_name: <DÉFINI HORS REPO>     # ne jamais committer

# --- COLLECTIONS -----------------------------------------------------
collections:
  # 1) ŒUVRES ---------------------------------------------------------
  #  SOURCE DE VÉRITÉ du site public : un fichier JSON par œuvre dans
  #  src/data/artworks/<slug>.json (lu au build par src/data/artworks.ts).
  #  Ajouter/modifier ici = éditer réellement la base des œuvres.
  - name: artworks
    label: "Œuvres"
    label_singular: "Œuvre"
    folder: "src/data/artworks"
    extension: json
    format: json
    create: true
    slug: "{{slug}}"
    identifier_field: title
    summary: "{{title}} — {{fields.status}}"
    sortable_fields: ["order", "title", "status"]
    fields:
      - { name: title, label: "Titre", widget: string }
      - { name: slug, label: "Identifiant (slug)", widget: string, hint: "Lettres minuscules et tirets, ex. « bleu-renaissance ». Sert d'adresse /oeuvres/<slug> et de nom de fichier." }
      - { name: id, label: "id (technique)", widget: string, required: false, hint: "Laisser = slug. Identifiant interne stable." }
      - { name: order, label: "Ordre d'affichage", widget: number, required: false, value_type: int, hint: "Plus petit = affiché en premier (10, 20, 30…)." }
      - { name: series, label: "Série", widget: string, required: false }
      - { name: year, label: "Année", widget: string, required: false }
      - { name: dimensions, label: "Dimensions", widget: string, required: false, hint: "Ex. 60 × 73 cm. Laisser vide si inconnu — ne pas inventer." }
      - { name: technique, label: "Technique", widget: string, required: false }
      - { name: status, label: "Statut", widget: select, default: "available", options: ["available", "reserved", "sold", "on-request"] }
      - { name: featured, label: "Mise en avant (accueil)", widget: boolean, default: false }
      - { name: showInAvailable, label: "Afficher dans « Disponibles »", widget: boolean, required: false, default: true }
      - { name: detailEnabled, label: "Page détail activée", widget: boolean, default: true, hint: "Désactiver pour ne pas générer la page /oeuvres/<slug>." }
      # --- VISUELS : upload simple vers /uploads/oeuvres/ ---
      - { name: image, label: "Photo principale", widget: image, required: false, hint: "Glissez une image : elle est déposée dans /uploads/oeuvres/. Vide = visuel d'attente." }
      - { name: images, label: "Galerie (photos secondaires)", widget: list, required: false, field: { name: image, label: "Image", widget: image } }
      - { name: alt, label: "Description de l'image (accessibilité — important)", widget: string, hint: "Décrivez l'image en une phrase (lecteurs d'écran + SEO)." }
      # --- TEXTES ---
      - { name: description, label: "Description courte", widget: text, required: false, hint: "Quelques mots affichés sur la carte et la fiche." }
      - { name: descriptionLong, label: "Description longue (optionnelle)", widget: text, required: false, hint: "Texte plus développé, affiché sur la fiche si renseigné." }
      # --- VENTE DOUCE : PAS de prix imposé. Vide = « Prix sur demande ». ---
      - { name: price, label: "Prix (optionnel)", widget: string, required: false, hint: "Laisser vide = « Prix sur demande ». Ne pas inventer." }
      # --- VIDÉO (optionnelle, univers) : rien ne s'affiche si désactivée ---
      - { name: videoEnabled, label: "Activer la vidéo", widget: boolean, default: false }
      - { name: videoUrl, label: "Lien vidéo (YouTube / Vimeo)", widget: string, required: false, hint: "Collez l'URL. Vide = aucune vidéo. Aucune URL inventée." }
      - { name: videoProvider, label: "Plateforme", widget: select, required: false, default: "", options: ["", "youtube", "vimeo", "other"] }
      - { name: videoTitle, label: "Titre de la vidéo", widget: string, required: false }
      - { name: videoCaption, label: "Légende sous la vidéo", widget: string, required: false }

  # 2) EXPOSITIONS ----------------------------------------------------
  - name: exhibitions
    label: "Expositions"
    label_singular: "Exposition"
    folder: "content/cms/exhibitions"
    create: true
    slug: "{{year}}-{{slug}}"
    fields:
      - { name: title, label: "Titre / événement", widget: string }
      - { name: location, label: "Lieu", widget: string, required: false }
      - { name: city, label: "Ville", widget: string, required: false }
      - { name: startDate, label: "Date de début", widget: datetime, required: false, date_format: "YYYY-MM-DD", time_format: false }
      - { name: endDate, label: "Date de fin", widget: datetime, required: false, date_format: "YYYY-MM-DD", time_format: false }
      - { name: type, label: "Type", widget: select, required: false, options: ["solo", "group", "residence", "performance", "event"] }
      - { name: description, label: "Description", widget: text, required: false }

  # 3) PAGES (textes éditoriaux) --------------------------------------
  - name: pages
    label: "Pages"
    files:
      - name: home
        label: "Accueil"
        file: "content/cms/pages/home.md"
        fields:
          - { name: eyebrow, label: "Petit intitulé", widget: string, required: false }
          - { name: title, label: "Titre", widget: string, required: false }
          - { name: lead, label: "Accroche", widget: text, required: false }
          - { name: body, label: "Texte", widget: markdown, required: false }
      - name: biographie
        label: "Biographie"
        file: "content/cms/pages/biographie.md"
        fields:
          - { name: title, label: "Titre", widget: string, required: false }
          - { name: body, label: "Récit", widget: markdown, required: false }
      - name: demarche
        label: "Démarche"
        file: "content/cms/pages/demarche.md"
        fields:
          - { name: title, label: "Titre", widget: string, required: false }
          - { name: body, label: "Texte", widget: markdown, required: false }
      - name: bleu-cendres
        label: "Bleu Cendres"
        file: "content/cms/pages/bleu-cendres.md"
        fields:
          - { name: title, label: "Titre", widget: string, required: false }
          - { name: body, label: "Texte", widget: markdown, required: false }
      - name: contact
        label: "Contact"
        file: "content/cms/pages/contact.md"
        fields:
          - { name: title, label: "Titre", widget: string, required: false }
          - { name: body, label: "Invitation", widget: markdown, required: false }

  # 4) SITE (identité, contact, navigation) ---------------------------
  - name: site
    label: "Site"
    files:
      - name: settings
        label: "Réglages du site"
        file: "content/cms/settings/site.yml"
        fields:
          - { name: artistName, label: "Nom de l'artiste", widget: string }
          - { name: role, label: "Rôle", widget: string }
          - { name: email, label: "E-mail public", widget: string }
          - { name: city, label: "Ville", widget: string, required: false }
          - { name: region, label: "Région", widget: string, required: false }
          - name: social
            label: "Réseaux"
            widget: list
            required: false
            fields:
              - { name: label, label: "Nom", widget: string }
              - { name: href, label: "Lien", widget: string }
          - name: nav
            label: "Navigation (Carnet)"
            widget: list
            fields:
              - { name: label, label: "Libellé", widget: string }
              - { name: href, label: "Lien", widget: string }
              - { name: note, label: "Note du Carnet", widget: string, required: false }

  # 5) THÈME (ambiance visuelle) --------------------------------------
  - name: theme
    label: "Ambiance visuelle"
    files:
      - name: settings
        label: "Couleurs & intensités"
        file: "content/cms/settings/theme.yml"
        fields:
          - { name: paper, label: "Papier (fond)", widget: color }
          - { name: bluePigment, label: "Bleu pigment", widget: color }
          - { name: ochreGold, label: "Ocre / or", widget: color }
          - { name: textureIntensity, label: "Intensité de matière", widget: select, options: ["none", "subtle", "medium"] }
          - { name: buttonMode, label: "Style des boutons", widget: select, options: ["handline", "artist-line", "pill"] }
          - { name: cardMode, label: "Style des cartes", widget: select, options: ["exhibition-label", "cartel", "card"] }

  # 6) BOUTIQUE DOUCE -------------------------------------------------
  - name: shop
    label: "Boutique douce"
    files:
      - name: settings
        label: "Vente douce"
        file: "content/cms/settings/shop.yml"
        fields:
          - { name: showPrices, label: "Afficher les prix", widget: boolean, default: false }
          - { name: defaultPriceLabel, label: "Texte par défaut", widget: string, default: "Prix sur demande" }
          - { name: enableReservation, label: "Activer la réservation", widget: boolean, default: true }
          - { name: enableCatalogRequest, label: "Activer la demande de catalogue", widget: boolean, default: true }
          - name: cta
            label: "Libellés des boutons"
            widget: object
            fields:
              - { name: artwork, label: "Demander une œuvre", widget: string }
              - { name: info, label: "Recevoir les informations", widget: string }
              - { name: catalog, label: "Demander le catalogue", widget: string }
              - { name: reserve, label: "Réserver", widget: string }

  # 7) RÉSEAUX SOCIAUX ------------------------------------------------
  - name: social
    label: "Réseaux sociaux"
    files:
      - name: settings
        label: "Préparation des publications"
        file: "content/cms/settings/social.yml"
        fields:
          - { name: defaultHashtags, label: "Mots-clés par défaut", widget: list, field: { name: tag, label: "#", widget: string } }
          - name: formats
            label: "Formats"
            widget: list
            fields:
              - { name: label, label: "Nom", widget: string }
              - { name: ratio, label: "Ratio", widget: string }
              - { name: size, label: "Taille", widget: string }
          - name: templates
            label: "Modèles de légendes"
            widget: list
            fields:
              - { name: label, label: "Type", widget: string }
              - { name: format, label: "Format", widget: string }
              - { name: caption, label: "Légende", widget: text }
